parameters:
  - name: env
    type: string
  - name: environment
    type: string
  - name: containerPrefix
    type: string
    default: 'campaign-resource-centre-v3'
  - name: dryRun
    type: boolean

steps:
  - checkout: none
  - task: DownloadPipelineArtifact@2
    displayName: Download production blob list
    inputs:
      artifactName: production.log
      targetPath: $(System.DefaultWorkingDirectory)

  - task: AzureCLI@2
    displayName: Get ${{ parameters.environment }} diff
    inputs:
      azureSubscription: dct-crccms-${{ parameters.env }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -ex
        az storage blob list \
          --account-name $ACCOUNT \
          --container-name $CONTAINER \
          --num-results 50000 \
          --only-show-errors \
          --query '[].name' \
          --output tsv \
        > ${{ parameters.environment }}.log  2>&1
        comm -23 production.log ${{ parameters.environment }}.log > production_to_${{ parameters.environment }}.log
    env:
      ACCOUNT: campaignsstrg${{ parameters.env }}uks
      CONTAINER: ${{ parameters.containerPrefix }}-${{ parameters.environment }}

  - task: PublishPipelineArtifact@1
    displayName: Publish ${{ parameters.environment }} blob list
    inputs:
      targetPath: ./${{ parameters.environment }}.log
      artifactName: ${{ parameters.environment }}.log

  - task: PublishPipelineArtifact@1
    displayName: Publish ${{ parameters.environment }} diff
    inputs:
      targetPath: ./production_to_${{ parameters.environment }}.log
      artifactName: production_to_${{ parameters.environment }}.log

  - task: AzureCLI@2
    displayName: Download ${{ parameters.environment }} diff blobs from production
    inputs:
      azureSubscription: dct-crccms-prod
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -ex
        mkdir -p $LOCAL_DIRECTORY
        while read blob; do
          az storage blob download \
            --account-name $ACCOUNT \
            --container-name $CONTAINER \
            --name "$blob" \
            --file "$LOCAL_DIRECTORY/$blob" \
            --only-show-errors
        done <production_to_${{ parameters.environment }}.log
    env:
      ACCOUNT: campaignscrcv3produks
      CONTAINER: campaign-resource-centre-v3-production
      LOCAL_DIRECTORY: $(System.DefaultWorkingDirectory)/blobs

  - bash: |
      echo "Print arg if needed: `if [[ '${{ parameters.dryRun }}' == 'True' ]]; then printf %s '--dryrun'; fi`"
      if [[ '${{ parameters.dryRun }}' == 'True' ]]; then
        echo "##vso[task.logissue type=warning;]Running in dryrun mode"
        echo "##vso[task.complete result=SucceededWithIssues;]"
      fi
    displayName: 'Dry Run: ${{ parameters.dryRun }}'

  - task: AzureCLI@2
    displayName: Upload diff blobs to ${{ parameters.environment }}
    inputs:
      azureSubscription: dct-crccms-prod
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -ex
        az storage blob upload-batch \
          --account-name $ACCOUNT \
          --destination $CONTAINER \
          --source $LOCAL_DIRECTORY \
          `if [[ '${{ parameters.dryRun }}' == 'True' ]]; then printf %s '--dryrun'; fi` \
          --only-show-errors
    env:
      ACCOUNT: campaignsstrg${{ parameters.env }}uks
      CONTAINER: ${{ parameters.containerPrefix }}-${{ parameters.environment }}
      LOCAL_DIRECTORY: $(System.DefaultWorkingDirectory)/blobs

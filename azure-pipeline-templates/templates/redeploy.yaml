steps:

# Since this is a deployment stage, we need to checkout the code. Non-deployment stages do this by default
- checkout: self
# Don't download pipeline artifacts
- download: none

- task: HelmDeploy@0
  displayName: 'helm deploy'
  inputs:
    connectionType: 'Kubernetes Service Connection'
    kubernetesServiceConnection: ${{parameters.kubernetesServiceConnection}}
    namespace: '${{ parameters.namespace }}'
    releaseName: 'nhsuk-cms-${{parameters.environment}}'
    command: upgrade
    chartType: FilePath
    chartPath: helm
    chartName: 'nhsuk-cms-${{parameters.environment}}'
    arguments: --reuse-values

steps:
  - task: DownloadSecureFile@1
    displayName: 'Download username/password secret file'
    name: CSVFile # The name with which to reference the secure file’s path on the agent, like $(CSVFile.secureFilePath)
    inputs:
      secureFile: oneuser.csv # A secret file in the pipeline library with a Parkhouse test API username/password value
  - bash: |
      #echo "##vso[task.setvariable variable=WORK;]$(System.DefaultWorkingDirectory)"
      #echo "##vso[task.setvariable variable=SECRETS_FILE;]$(CSVFile.secureFilePath)"
      #echo "##vso[task.setvariable variable=TAGS;]$(tags)"
      #echo "##vso[task.setvariable variable=BASE_URL;]$(hostUrl)"

      echo "Test $BASE_URL in $WORK with tags: $TAGS"
      ls
      mkdir -p $WORK/tmp
      cd $WORK/tmp
      echo "### Running from " $(pwd)

      echo "### Running docker image"
      docker login dctimages.azurecr.io -u ${REPO_USERNAME:=dctimages} -p ${REPO_PASSWORD:?No password for the Docker repo (REPO_PASSWORD)}
      docker pull dctimages.azurecr.io/acceptancetests
      docker run \
        --env BASE_URL \
        --env TAGS \
        --mount type=bind,source=$WORK/FrontEndTests,target=/automation-ui/FrontEndTests \
        --mount type=bind,source=$SECRETS_FILE,target=/automation-ui/login.csv \
        dctimages.azurecr.io/acceptancetests
      echo "##vso[task.setvariable variable=PASSED;]$?"
      exit $PASSED
    env:
      WORK: $(System.DefaultWorkingDirectory)
      TAGS: $(tags)
      SECRETS_FILE: $(CSVFile.secureFilePath)
      BASE_URL: $(hostUrl)
    displayName: 'Run Frontend tests in Docker container'

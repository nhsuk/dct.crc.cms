pool:
  vmImage: ubuntu-latest

trigger: none
pr: none

parameters:
  - name: syncToReview
    type: boolean
    default: false
    displayName: Sync To Review Env
  - name: syncToIntegration
    type: boolean
    default: false
    displayName: Sync To Integration Env
  - name: syncToStaging
    type: boolean
    default: false
    displayName: Sync To Staging Env

variables:
  - name: AZURE_STORAGE_AUTH_MODE
    value: login

resources:
  - repo: self

stages:
  - stage: CopyFromProdDB
    displayName: Copy Production Database
    jobs:
      - job: ProdDBCopy
        steps:
          - task: AzureKeyVault@2
            displayName: 'Azure Key Vault: dct-crc-kv-app-prod-uks'
            inputs:
              azureSubscription: dct-crccms-prod
              KeyVaultName: dct-crc-kv-app-prod-uks
              SecretsFilter: db-pass, db-name, db-host, db-user
          - template: templates/db-sync-download-dump.yaml
            parameters:
              environment: production

  - stage: CopyToReviewDB
    displayName: Copy to Review Database
    dependsOn:
      - CopyFromProdDB
    condition: and(succeeded(), eq('${{ parameters.syncToReview }}', true))
    jobs:
      - job: ReviewPaste
        steps:
          - template: templates/db-sync-env-sync.yaml
            parameters:
              azureVaultSubscription: dct-crccms-dev
              VaultId: dct-crc-kv-app-dev-uks
              environment: review
              env: dev

  - stage: CopyToIntegrationDB
    displayName: Copy to Integration Database
    dependsOn:
      - CopyFromProdDB
    condition: and(succeeded(), eq('${{ parameters.syncToIntegration }}', true))
    jobs:
      - job: IntegrationPaste
        steps:
          - template: templates/db-sync-env-sync.yaml
            parameters:
              azureVaultSubscription: dct-crccms-int
              VaultId: dct-crc-kv-app-int-uks
              environment: integration
              env: int

  - stage: CopyToStagingDB
    displayName: Copy to Staging Database
    dependsOn:
      - CopyFromProdDB
    condition: and(succeeded(), eq('${{ parameters.syncToStaging }}', true))
    jobs:
      - deployment: approval
        environment: staging
      - job: StagingPaste
        steps:
          - template: templates/db-sync-env-sync.yaml
            parameters:
              azureVaultSubscription: dct-crccms-stag
              VaultId: dct-crc-kv-app-stag-uks
              environment: staging
              env: stag

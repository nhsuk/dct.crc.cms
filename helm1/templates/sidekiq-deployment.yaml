{{- if .Values.sidekiqDeployment }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-sidekiq-deploy
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.appName }}-sidekiq
{{ include "charts.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.sidekiqReplicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ .Values.appName }}-sidekiq
  template:
    metadata:
      labels:
        app: {{ .Values.appName }}-sidekiq
        date: "{{ now |  unixEpoch }}"
        ingress: haproxy
    spec:
      nodeSelector:
        org: {{ .Values.labelOrg | quote }}
      tolerations:
      - key: "org"
        operator: "Equal"
        effect: "NoSchedule"
        value:  {{ .Values.labelOrg | quote }}
      {{- if .Values.deploymentNonRootUser }}
      securityContext:
        runAsUser: 1001
        runAsGroup: 2001
        fsGroup: 3001
      {{- end}}
      containers:
      - name: {{ .Values.appName }}-sidekiq
        image: {{ .Values.imageName }}:{{ .Values.imageTag }}
        imagePullPolicy: {{ .Values.imagePullPolicy }}
        {{ if ne .Values.autoscaleEnv "int" }}
        {{- include "charts.resources-limits" . | nindent 8 }}
        {{ end }}
        #readinessProbe:
        #  tcpSocket:
        #    port: {{ .Values.appPort }}
        #  initialDelaySeconds: 2
        #  periodSeconds: 2
        #livenessProbe:
        #  httpGet:
        #    path: /sample-cms-healthcheck
        #    port: {{ .Values.appPort }}
        {{- if .Values.sidekiqPort }}
        ports:
        - containerPort: {{ .Values.sidekiqPort }}
        {{- end }}
        {{- include "dct-application.env-sidekiq-variables" . | nindent 8 }}
        args: {{ .Values.sidekiqArgs | toJson }}
{{- end }}
